version: 2

models:
  - name: stg_sales
    description: "Cleaned and validated sales transactions"
    columns:
      - name: sale_id
        description: "Unique identifier for each sale"
        tests:
          - unique
          - not_null
      - name: quantity
        description: "Number of units sold"
        tests:
          - not_null
      - name: sales_amount
        description: "Total sale value in NZD"
        tests:
          - not_null
      - name: product_id
        description: "Foreign key to dim_product"
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: store_id
        description: "Foreign key to dim_store"
        tests:
          - not_null
          - relationships:
              to: ref('stg_stores')
              field: store_id

  - name: stg_products
    description: "Product reference table"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: category
        tests:
          - not_null
          - accepted_values:
              values: ["Dairy", "Bakery", "Meat", "Seafood", "Pantry"]

  - name: stg_stores
    description: "Store reference table"
    columns:
      - name: store_id
        tests:
          - unique
          - not_null
      - name: region
        tests:
          - accepted_values:
              values: ["North Island", "South Island"]