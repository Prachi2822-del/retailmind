name: RetailMind CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pandas boto3 anthropic python-dotenv
          pip install fastapi uvicorn httpx pytest

      - name: Generate test data
        run: |
          mkdir -p data/raw
          python data/generate_data.py

      - name: Run ETL pipeline
        run: python ingestion/pipeline.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-2

      - name: Build star schema
        run: python app/warehouse/star_schema.py

      - name: Run validator tests
        run: python -m pytest tests/test_validators.py -v

      - name: Run API tests
        run: python -m pytest tests/test_api.py -v

      - name: Run agent tests
        run: python -m pytest tests/test_agent.py -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}